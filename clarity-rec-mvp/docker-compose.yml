version: '3.8'

services:
  # Основной бэкенд приложения (аутентификация, пользователи, UI)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: clarity-rec-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=clarity-rec-secret-key-mvp-2024
      - DB_PATH=/app/data/clarityrec.db
      - CORE_SERVICE_URL=http://clarityrec-core:3001
      - API_KEY=clarity-rec-demo-api-key-2024
    volumes:
      - db-data:/app/data
    depends_on:
      - clarityrec-core
    restart: unless-stopped

  # Микросервис рекомендаций ClarityRec Core
  clarityrec-core:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: clarity-rec-core
    ports:
      - "3001:3001"
    environment:
      - API_KEY=clarity-rec-demo-api-key-2024
      - NODE_ENV=production
      - CORS_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: clarity-rec-frontend
    expose:
      - "5173"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: clarity-rec-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - clarityrec-core
    restart: unless-stopped

volumes:
  db-data:
