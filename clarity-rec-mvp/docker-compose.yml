version: '3.8'

services:
  # Основной бэкенд приложения (аутентификация, пользователи, UI)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: clarity-rec-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/clarityrec.db
      - CORE_SERVICE_URL=http://clarityrec-core:3001
      - CLARITYREC_API_KEY=clarity-rec-secret-key-2024
      - JWT_SECRET=super-secret-jwt-key-change-in-prod
      - PORT=3000
    volumes:
      - db-data:/app/data
    depends_on:
      - clarityrec-core
      - xai-module
    restart: unless-stopped

  # Микросервис рекомендаций ClarityRec Core
  clarityrec-core:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: clarity-rec-core
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - CORS_ORIGINS=*
      - CLARITYREC_API_KEY=clarity-rec-secret-key-2024
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # XAI Module - независимый модуль визуализации объяснений
  xai-module:
    build:
      context: ./xai-module
      dockerfile: Dockerfile
    container_name: clarity-rec-xai-module
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - CORE_API_URL=http://clarityrec-core:3001
      - API_KEY=clarity-rec-secret-key-2024
      - PORT=3002
      - HOST=0.0.0.0
    depends_on:
      - clarityrec-core
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: clarity-rec-frontend
    expose:
      - "5173"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: clarity-rec-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - clarityrec-core
      - xai-module
    restart: unless-stopped

volumes:
  db-data:
